<section class="min-h-[calc(100vh-4rem)] bg-[#fbfbfa] px-4 py-5 text-slate-900 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-5xl">
    <header
      class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200/70 pb-3 text-sm text-slate-500"
    >
      <div class="flex min-w-0 items-center gap-2">
        <span class="font-medium text-slate-700">Diary</span>
        <span class="text-slate-300">/</span>
        <span class="truncate">{{ pageTitle || 'Untitled' }}</span>
      </div>
      <div class="flex items-center gap-2">
        <span
          class="rounded-md bg-white px-2 py-1 text-xs text-slate-500 shadow-sm ring-1 ring-slate-200"
        >
          {{ blockCount }} blocks
        </span>
        <span
          class="rounded-md bg-white px-2 py-1 text-xs text-slate-500 shadow-sm ring-1 ring-slate-200"
        >
          {{ savedAt }}
        </span>
      </div>
    </header>

    <main
      class="mx-auto max-w-3xl bg-white px-4 pb-20 pt-10 shadow-[0_1px_18px_rgba(15,23,42,0.05)] sm:px-10 md:px-14"
    >
      <input
        class="block w-full border-0 bg-transparent text-5xl font-bold leading-tight text-slate-950 outline-none placeholder:text-slate-300"
        [value]="pageTitle"
        placeholder="Untitled"
        aria-label="Page title"
        (input)="updateTitle($event)"
      />

      <div
        class="mt-5 flex flex-wrap items-center gap-2 border-y border-slate-100 py-3 text-sm text-slate-600"
      >
        <button
          type="button"
          title="Text"
          aria-label="Text"
          class="h-8 rounded-md px-3 font-medium hover:bg-slate-100"
          (click)="insertTextBlock()"
        >
          Text
        </button>
        <button
          type="button"
          title="Heading"
          aria-label="Heading"
          class="h-8 rounded-md px-3 font-medium hover:bg-slate-100"
          (click)="insertHeadingBlock()"
        >
          Heading
        </button>
        <button
          type="button"
          title="List"
          aria-label="List"
          class="h-8 rounded-md px-3 font-medium hover:bg-slate-100"
          (click)="insertListBlock()"
        >
          List
        </button>
        <button
          type="button"
          title="Image"
          aria-label="Image"
          class="h-8 rounded-md px-3 font-medium hover:bg-slate-100"
          (click)="insertImageBlock()"
        >
          Image
        </button>
        <button
          type="button"
          title="Audio"
          aria-label="Audio"
          class="h-8 rounded-md px-3 font-medium hover:bg-slate-100"
          (click)="insertAudioBlock()"
        >
          Audio
        </button>
        <button
          type="button"
          title="Divider"
          aria-label="Divider"
          class="h-8 rounded-md px-3 font-medium hover:bg-slate-100"
          (click)="insertDividerBlock()"
        >
          Divider
        </button>
      </div>

      @if (!editorReady) {
        <div class="py-10 text-sm text-slate-400">
          {{ editorError || 'Loading editor...' }}
        </div>
      }

      <div
        #editorHolder
        class="mt-6 min-h-[58vh] text-[17px] leading-8 text-slate-900 [&_.ce-block]:my-1 [&_.ce-block__content]:max-w-none [&_.ce-block__content]:px-0 [&_.ce-code__textarea]:rounded-md [&_.ce-code__textarea]:bg-slate-950 [&_.ce-code__textarea]:text-slate-50 [&_.ce-delimiter]:my-7 [&_.ce-delimiter:before]:text-slate-300 [&_.ce-header]:font-semibold [&_.ce-header]:leading-tight [&_.ce-header[data-level='1']]:text-4xl [&_.ce-header[data-level='2']]:text-3xl [&_.ce-header[data-level='3']]:text-2xl [&_.ce-inline-toolbar]:rounded-lg [&_.ce-inline-toolbar]:border-slate-200 [&_.ce-paragraph]:leading-8 [&_.ce-paragraph[data-placeholder]:empty:before]:text-slate-400 [&_.ce-popover]:rounded-lg [&_.ce-popover]:border-slate-200 [&_.ce-toolbar__content]:max-w-none [&_.ce-toolbar__plus]:text-slate-400 [&_.ce-toolbar__settings-btn]:text-slate-400 [&_.cdx-block]:max-w-none [&_.cdx-input]:rounded-md [&_.cdx-input]:border-slate-200 [&_.cdx-input]:shadow-none [&_.cdx-list]:pl-6 [&_.cdx-marker]:bg-yellow-200/80 [&_.cdx-quote]:border-l-4 [&_.cdx-quote]:border-slate-300 [&_.cdx-quote]:pl-4 [&_.codex-editor__redactor]:pb-24 [&_.editorjs-audio-card]:my-4 [&_.editorjs-audio-card]:rounded-lg [&_.editorjs-audio-card]:border [&_.editorjs-audio-card]:border-slate-200 [&_.editorjs-audio-card]:bg-slate-50 [&_.editorjs-audio-card]:p-4 [&_.editorjs-audio-caption]:mt-3 [&_.editorjs-audio-caption]:w-full [&_.editorjs-audio-caption]:rounded-md [&_.editorjs-audio-caption]:border [&_.editorjs-audio-caption]:border-slate-200 [&_.editorjs-audio-caption]:bg-white [&_.editorjs-audio-caption]:px-3 [&_.editorjs-audio-caption]:py-2 [&_.editorjs-audio-caption]:text-sm [&_.editorjs-audio-file]:block [&_.editorjs-audio-file]:w-full [&_.editorjs-audio-file]:rounded-md [&_.editorjs-audio-file]:border [&_.editorjs-audio-file]:border-dashed [&_.editorjs-audio-file]:border-slate-300 [&_.editorjs-audio-file]:bg-white [&_.editorjs-audio-file]:p-3 [&_.editorjs-audio-label]:mb-3 [&_.editorjs-audio-label]:text-sm [&_.editorjs-audio-label]:font-medium [&_.editorjs-audio-label]:text-slate-700 [&_.editorjs-audio-player]:w-full [&_.editorjs-audio-remove]:mt-3 [&_.editorjs-audio-remove]:rounded-md [&_.editorjs-audio-remove]:px-3 [&_.editorjs-audio-remove]:py-2 [&_.editorjs-audio-remove]:text-sm [&_.editorjs-audio-remove]:font-medium [&_.editorjs-audio-remove]:text-slate-600 [&_.editorjs-audio-remove:hover]:bg-slate-100 [&_.editorjs-audio-url-button]:rounded-md [&_.editorjs-audio-url-button]:bg-slate-900 [&_.editorjs-audio-url-button]:px-3 [&_.editorjs-audio-url-button]:py-2 [&_.editorjs-audio-url-button]:text-sm [&_.editorjs-audio-url-button]:font-medium [&_.editorjs-audio-url-button]:text-white [&_.editorjs-audio-url-input]:min-w-0 [&_.editorjs-audio-url-input]:flex-1 [&_.editorjs-audio-url-input]:rounded-md [&_.editorjs-audio-url-input]:border [&_.editorjs-audio-url-input]:border-slate-200 [&_.editorjs-audio-url-input]:px-3 [&_.editorjs-audio-url-input]:py-2 [&_.editorjs-audio-url-row]:mt-3 [&_.editorjs-audio-url-row]:flex [&_.editorjs-audio-url-row]:gap-2 [&_.image-tool__caption]:text-sm [&_.image-tool__image-picture]:rounded-md"
      ></div>
    </main>
  </div>
</section>
